x-comfyui-base: &comfyui-base
  image: ghcr.io/lecode-official/comfyui-docker:latest
  restart: unless-stopped
  volumes:
    - ${COMFY_PATH:-./data/comfy}/models:/opt/comfyui/models:rw
    - ${COMFY_PATH:-./data/comfy}/custom_nodes:/opt/comfyui/custom_nodes:rw
    - ${COMFY_PATH:-./data/comfy}/output:/opt/comfyui/output:rw
  environment:
    USER_ID: "${UID:-1000}"
    GROUP_ID: "${GID:-1000}"
  networks:
    ai_network:
      aliases:
        - comfyui
  labels:
    - "traefik.docker.network=${AI_NETWORK_NAME:-ai_network}"
    - "traefik.enable=true"
    - "traefik.http.routers.comfyui.rule=Host(`comfyui.${MAIN_DOMAIN}`)"
    - "traefik.http.routers.comfyui.entrypoints=websecure"
    - "traefik.http.routers.comfyui.tls.certresolver=step"
    - "traefik.http.services.comfyui.loadbalancer.server.port=8188"

x-ollama-base: &ollama-base
  image: ollama/ollama
  ports:
    - "11434:11434"
  volumes:
    - ollama_data:/root/.ollama
    # Modelfiles para instancias personalizadas del blueprint (montado read-only).
    # Ubicación: ./assets/ollama/Modelfile.architect y Modelfile.editor
    - ./assets/ollama:/modelfiles:ro
  restart: unless-stopped
  environment:
    # Descarga el modelo de VRAM inmediatamente tras cada inferencia.
    # Crítico para el swap secuencial arquitecto→editor sin colisiones de memoria.
    OLLAMA_KEEP_ALIVE: "0"
    # Escucha en todas las interfaces dentro del contenedor.
    OLLAMA_HOST: "0.0.0.0"
    # Flash Attention: reduce uso de memoria en atención, mejora velocidad en 12GB.
    OLLAMA_FLASH_ATTENTION: "1"
    # Un único stream de inferencia — evita contención en GPU de consumidor.
    # Con KEEP_ALIVE=0 e inferencia secuencial no hay beneficio en paralelo > 1.
    OLLAMA_NUM_PARALLEL: "1"
  healthcheck:
    # ollama list verifica que el servidor responde — curl no está disponible en la imagen.
    test: ["CMD-SHELL", "ollama list > /dev/null 2>&1 || exit 1"]
    interval: 30s
    timeout: 10s
    retries: 10
    start_period: 60s
  networks:
    ai_network:
      aliases:
        - ollama
  labels:
    - "traefik.docker.network=${AI_NETWORK_NAME:-ai_network}"
    - "traefik.enable=true"
    - "traefik.http.routers.ollama.rule=Host(`ollama.${MAIN_DOMAIN}`)"
    - "traefik.http.routers.ollama.entrypoints=websecure"
    - "traefik.http.routers.ollama.tls.certresolver=step"
    - "traefik.http.services.ollama.loadbalancer.server.port=11434"

x-whisper-base: &whisper-base
  volumes:
    - whisper_models:/root/.cache/whisper
  restart: unless-stopped
  ports:
    - "127.0.0.1:9000:9000"
  networks:
    ai_network:
      aliases:
        - stt
  environment:
    # Este es el motor y el modelo que quieres usar.
    # El modelo 'base' es pequeño y se descarga rápido.
    - ASR_ENGINE=whisperx # o faster-whisper o openai_whisper
    - ASR_MODEL=base
    - ASR_DEVICE=cpu # Se sobrescribe en el servicio de GPU
    - ASR_MODEL_PATH=/root/.cache/whisper # Ruta dentro del contenedor donde se guardarán los modelos.
  labels:
    - "traefik.docker.network=${AI_NETWORK_NAME:-ai_network}"
    - "traefik.enable=true"
    - "traefik.http.routers.stt.rule=Host(`stt.${MAIN_DOMAIN}`)"
    - "traefik.http.routers.stt.entrypoints=websecure"
    - "traefik.http.routers.stt.tls.certresolver=step"
    - "traefik.http.services.stt.loadbalancer.server.port=9000"

x-coqui-env: &coqui-env-base
  COQUI_DEVICE: cpu
  PYTHONUNBUFFERED: 1
  COQUI_TOS_AGREED: "1"
x-coqui-base: &coqui-base
  networks:
    ai_network:
      aliases:
        - tts
  restart: unless-stopped
  environment: *coqui-env-base
  ports:
    - "127.0.0.1:5002:5002"
  volumes:
    - tts_data:/root/.local/share/tts
  labels:
    - "traefik.docker.network=${AI_NETWORK_NAME:-ai_network}"
    - "traefik.enable=true"
    - "traefik.http.routers.tts.rule=Host(`tts.${MAIN_DOMAIN}`)"
    - "traefik.http.routers.tts.entrypoints=websecure"
    - "traefik.http.routers.tts.tls.certresolver=step"
    - "traefik.http.services.tts.loadbalancer.server.port=5002"

  entrypoint: /bin/bash

volumes:
  ollama_data:
  qdrant_data:
  tts_data:
  whisper_models:
  mcp_memory_data:

networks:
  ai_network:
    name: ${AI_NETWORK_NAME:-ai_network}
    external: true

services:
  ollama:
    <<: *ollama-base
    profiles: ["cpu"]
  ollama-gpu:
    <<: *ollama-base
    profiles: ["gpu"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      # Hereda todas las variables de x-ollama-base y añade la de GPU.
      # IMPORTANTE: redeclarar explícitamente — Docker Compose no mergea
      # environment maps de anchors con los del servicio, los reemplaza.
      OLLAMA_KEEP_ALIVE: "0"
      OLLAMA_HOST: "0.0.0.0"
      OLLAMA_FLASH_ATTENTION: "1"
      OLLAMA_NUM_PARALLEL: "1"
      NVIDIA_VISIBLE_DEVICES: all
    runtime: nvidia
  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    ports: # Opcional: si quieres exponerlo directamente
      - "6333:6333"
    networks:
      ai_network:
        aliases:
          - qdrant
    profiles: ["cpu", "gpu"]
    labels:
      - "traefik.docker.network=${AI_NETWORK_NAME:-ai_network}"
      - "traefik.enable=true"
      - "traefik.http.routers.qdrant.rule=Host(`qdrant.${MAIN_DOMAIN}`)"
      - "traefik.http.routers.qdrant.entrypoints=websecure"
      - "traefik.http.routers.qdrant.tls.certresolver=step"
      - "traefik.http.services.qdrant.loadbalancer.server.port=6333" # Puerto HTTP/GRPC

  whisper-asr-cpu:
    <<: *whisper-base
    image: onerahmet/openai-whisper-asr-webservice:latest
    profiles: ["cpu"]
  whisper-asr-gpu:
    <<: *whisper-base
    image: onerahmet/openai-whisper-asr-webservice:latest-gpu
    profiles: ["gpu"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - ASR_DEVICE=cuda
    runtime: nvidia
  coqui-cpu:
    <<: *coqui-base
    image: ${COQUI_CPU_IMAGE:-ghcr.io/coqui-ai/tts-cpu}
    profiles: ["cpu"]
    command:
      - -c
      - "tts-server --model_name ${TTS_MODEL} --use_cuda false"
  coqui-gpu:
    <<: *coqui-base
    image: ${COQUI_GPU_IMAGE:-ghcr.io/coqui-ai/tts}
    profiles: ["gpu"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      <<: *coqui-env-base
      COQUI_DEVICE: cuda
      NVIDIA_VISIBLE_DEVICES: all
    runtime: nvidia
    command:
      - -c
      - "tts-server --model_name ${TTS_MODEL} --use_cuda true"
  comfyui-cpu:
    <<: *comfyui-base
    profiles: ["cpu"]
  comfyui-gpu:
    <<: *comfyui-base
    profiles: ["gpu"]
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      USER_ID: "${UID:-1000}"
      GROUP_ID: "${GID:-1000}"
      NVIDIA_VISIBLE_DEVICES: all
  # ══════════════════════════════════════════════════════════════════════════
  # MCP SERVERS — Herramientas para los LLM
  # ══════════════════════════════════════════════════════════════════════════
  mcp-playwright:
    build:
      context: ./assets/mcp/playwright
      dockerfile: Dockerfile
    profiles: ["cpu", "gpu"]
    restart: unless-stopped
    networks:
      ai_network:
        aliases: [mcp-playwright]
    labels:
      - "traefik.docker.network=${AI_NETWORK_NAME:-ai_network}"
      - "traefik.enable=true"
      - "traefik.http.routers.mcp-playwright.rule=Host(`mcp-playwright.${MAIN_DOMAIN}`)"
      - "traefik.http.routers.mcp-playwright.entrypoints=websecure"
      - "traefik.http.routers.mcp-playwright.tls.certresolver=step"
      - "traefik.http.services.mcp-playwright.loadbalancer.server.port=8000"

  mcp-filesystem:
    build:
      context: ./assets/mcp/filesystem
      dockerfile: Dockerfile
    profiles: ["cpu", "gpu"]
    restart: unless-stopped
    volumes:
      - ${MCP_FS_PATH_1:-./data/docs}:/mcp/fs/docs:rw
      - ${MCP_FS_PATH_2:-./data/exports}:/mcp/fs/exports:rw
    networks:
      ai_network:
        aliases: [mcp-filesystem]
    labels:
      - "traefik.docker.network=${AI_NETWORK_NAME:-ai_network}"
      - "traefik.enable=true"
      - "traefik.http.routers.mcp-filesystem.rule=Host(`mcp-filesystem.${MAIN_DOMAIN}`)"
      - "traefik.http.routers.mcp-filesystem.entrypoints=websecure"
      - "traefik.http.routers.mcp-filesystem.tls.certresolver=step"
      - "traefik.http.services.mcp-filesystem.loadbalancer.server.port=8000"

  mcp-memory:
    build:
      context: ./assets/mcp/memory
      dockerfile: Dockerfile
    profiles: ["cpu", "gpu"]
    restart: unless-stopped
    volumes:
      - mcp_memory_data:/mcp/memory
    environment:
      MEMORY_FILE_PATH: /mcp/memory/memory.json
    networks:
      ai_network:
        aliases: [mcp-memory]
    labels:
      - "traefik.docker.network=${AI_NETWORK_NAME:-ai_network}"
      - "traefik.enable=true"
      - "traefik.http.routers.mcp-memory.rule=Host(`mcp-memory.${MAIN_DOMAIN}`)"
      - "traefik.http.routers.mcp-memory.entrypoints=websecure"
      - "traefik.http.routers.mcp-memory.tls.certresolver=step"
      - "traefik.http.services.mcp-memory.loadbalancer.server.port=8000"

  mcp-searxng:
    build:
      context: ./assets/mcp/searxng
      dockerfile: Dockerfile
    profiles: ["mcp-optional"]
    restart: unless-stopped
    environment:
      SEARXNG_URL: ${MCP_SEARXNG_URL}
    networks:
      ai_network:
        aliases: [mcp-searxng]
    labels:
      - "traefik.docker.network=${AI_NETWORK_NAME:-ai_network}"
      - "traefik.enable=true"
      - "traefik.http.routers.mcp-searxng.rule=Host(`mcp-searxng.${MAIN_DOMAIN}`)"
      - "traefik.http.routers.mcp-searxng.entrypoints=websecure"
      - "traefik.http.routers.mcp-searxng.tls.certresolver=step"
      - "traefik.http.services.mcp-searxng.loadbalancer.server.port=8000"

  speech-gateway:
    build: ./speech-gateway
    container_name: speech-gateway
    profiles: ["cpu", "gpu"]
    environment:
      # URLs internas de tu stack de Docker
      - WHISPER_URL=http://127.0.0.1:9000/asr
      - OLLAMA_URL=http://127.0.0.1:11434
      - COQUI_URL=http://127.0.0.1:5002
      - DEFAULT_LLM_MODEL=${DEFAULT_LLM_MODEL:-qwen2.5:7b-instruct}
    restart: unless-stopped
    network_mode: host
